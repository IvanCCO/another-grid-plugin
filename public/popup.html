<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Overlay</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f3ef;
      --panel: #ffffff;
      --panel-soft: #f6f6f3;
      --line: rgba(16, 24, 40, 0.1);
      --text: #111827;
      --muted: #6b7280;
      --blue: #1f8fff;
      --blue-soft: rgba(31, 143, 255, 0.12);
      --orange: #f28c28;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 288px;
      margin: 0;
      padding: 16px;
      background:
        radial-gradient(circle at top left, rgba(31, 143, 255, 0.12), transparent 34%),
        linear-gradient(180deg, #f8f8f5 0%, #f1f0ea 100%);
      color: var(--text);
      font-family:
        'SF Pro Display',
        'Segoe UI',
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;
    }

    .popup {
      display: grid;
      gap: 12px;
    }

    .launcher {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 40px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow:
        0 16px 34px rgba(15, 23, 42, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(16px);
    }

    .icon-button,
    .quick-axis,
    .icon-toggle,
    .axis-option {
      appearance: none;
      border: 0;
      font: inherit;
      margin: 0;
    }

    .icon-toggle {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid rgba(17, 24, 39, 0.12);
      cursor: pointer;
      transition:
        transform 140ms ease-out,
        background 160ms ease,
        box-shadow 160ms ease,
        border-color 160ms ease;
    }

    .icon-toggle[data-enabled='true'] {
      background: rgba(242, 140, 40, 0.14);
      border-color: rgba(242, 140, 40, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .icon-toggle:active,
    .quick-axis:active,
    .icon-button:active,
    .axis-option:active {
      transform: scale(0.97);
    }

    .toggle-dot,
    .icon-mask,
    .axis-option-icon {
      display: inline-block;
    }

    .toggle-dot {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #111827;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        0 1px 2px rgba(15, 23, 42, 0.16);
      transition:
        background 160ms ease,
        transform 140ms ease-out;
    }

    .icon-toggle[data-enabled='true'] .toggle-dot {
      background: var(--orange);
      transform: scale(1.02);
    }

    .icon-mask,
    .axis-option-icon {
      width: 20px;
      height: 20px;
      background: currentColor;
      mask-image: var(--icon-url);
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
      -webkit-mask-image: var(--icon-url);
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: contain;
      transform: rotate(var(--icon-rotation, 0deg));
    }

    .quick-axis {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      height: 56px;
      padding: 0 14px;
      border-radius: 18px;
      background: var(--panel-soft);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition:
        transform 140ms ease-out,
        background 160ms ease;
    }

    .quick-axis:hover,
    .icon-button:hover,
    .axis-option:hover {
      background: #eef2f7;
    }

    .quick-axis-copy {
      min-width: 0;
      display: grid;
    }

    .quick-axis-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.1;
    }

    .quick-axis-subtitle {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: transparent;
      color: #667085;
      cursor: pointer;
      transition:
        transform 140ms ease-out,
        background 160ms ease;
    }

    .icon-button[data-open='true'] {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .caret {
      display: inline-block;
      font-size: 18px;
      line-height: 1;
      transition: transform 180ms ease-out;
    }

    .icon-button[data-open='true'] .caret {
      transform: rotate(180deg);
    }

    .advanced {
      display: grid;
      gap: 14px;
      padding: 14px;
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .advanced[hidden] {
      display: none;
    }

    .section {
      display: grid;
      gap: 10px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .axis-picker {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .axis-option {
      display: grid;
      justify-items: center;
      gap: 8px;
      padding: 10px 8px;
      border-radius: 14px;
      background: #f6f7fa;
      color: #475467;
      cursor: pointer;
      transition:
        transform 140ms ease-out,
        background 160ms ease,
        color 160ms ease;
    }

    .axis-option[data-selected='true'] {
      background: var(--blue);
      color: #ffffff;
    }

    .axis-option-label {
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .field-label,
    .field-value {
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .field-label {
      color: var(--muted);
    }

    .field-value {
      color: var(--text);
    }

    select,
    input[type='range'],
    input[type='color'] {
      width: 100%;
    }

    select {
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
    }

    input[type='range'] {
      accent-color: var(--blue);
    }

    .color-row {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    input[type='color'] {
      height: 38px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main class="popup">
    <section class="launcher">
      <button id="enabled-toggle" class="icon-toggle" type="button" aria-pressed="false">
        <span class="toggle-dot"></span>
      </button>

      <button id="quick-axis" class="quick-axis" type="button">
        <span id="quick-axis-icon" class="icon-mask"></span>
        <span class="quick-axis-copy">
          <span id="quick-axis-label" class="quick-axis-title">Vertical</span>
          <span class="quick-axis-subtitle">Troca rápida de modo</span>
        </span>
      </button>

      <button
        id="advanced-toggle"
        class="icon-button"
        type="button"
        aria-expanded="false"
        aria-label="Open advanced settings"
      >
        <span class="caret">⌄</span>
      </button>
    </section>

    <section id="advanced-panel" class="advanced" hidden>
      <div class="section">
        <div class="section-title">Modo</div>
        <div id="axis-picker" class="axis-picker"></div>
        <select id="axis" hidden>
          <option value="columns">Vertical</option>
          <option value="rows">Horizontal</option>
          <option value="grid">Grid</option>
        </select>
      </div>

      <div class="section">
        <div class="section-title">Layout</div>

        <label class="field">
          <span class="field-label">Distribution</span>
          <select id="distribution"></select>
        </label>

        <label class="field">
          <span class="field-row">
            <span class="field-label">Count</span>
            <output id="count-value" class="field-value">6</output>
          </span>
          <input id="count" type="range" min="1" max="24" step="1" />
        </label>

        <label id="size-field" class="field">
          <span class="field-row">
            <span class="field-label">Size</span>
            <output id="size-value" class="field-value">72</output>
          </span>
          <input id="size" type="range" min="1" max="400" step="1" />
        </label>

        <label class="field">
          <span class="field-row">
            <span class="field-label">Margin</span>
            <output id="margin-value" class="field-value">32</output>
          </span>
          <input id="margin" type="range" min="0" max="240" step="1" />
        </label>

        <label class="field">
          <span class="field-row">
            <span class="field-label">Gutter</span>
            <output id="gutter-value" class="field-value">20</output>
          </span>
          <input id="gutter" type="range" min="0" max="240" step="1" />
        </label>
      </div>

      <div class="section">
        <div class="section-title">Appearance</div>

        <label class="field">
          <span class="field-row">
            <span class="field-label">Opacity</span>
            <output id="opacity-value" class="field-value">12%</output>
          </span>
          <div class="color-row">
            <input id="color" type="color" value="#FF8A3D" />
            <input id="opacity" type="range" min="0" max="100" step="1" />
          </div>
        </label>
      </div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>

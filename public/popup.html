<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Systems Overlay</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171717;
      --panel: #232323;
      --panel-muted: #2b2b2b;
      --border: #3b3b3b;
      --text: #f5f1ea;
      --muted: #b2a89a;
      --accent: #f15a29;
      --accent-soft: rgba(241, 90, 41, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 340px;
      margin: 0;
      padding: 18px;
      background:
        radial-gradient(circle at top left, rgba(241, 90, 41, 0.14), transparent 34%),
        linear-gradient(180deg, #1c1c1c 0%, #151515 100%);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
    }

    .panel {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      background: rgba(24, 24, 24, 0.94);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.34);
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'SF Mono', 'Monaco', monospace;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      font-weight: 600;
      line-height: 1;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .toggle {
      display: grid;
      gap: 6px;
      justify-items: end;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .toggle span {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .toggle input {
      appearance: none;
      width: 46px;
      height: 28px;
      border-radius: 999px;
      background: #343434;
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      cursor: pointer;
      transition: background 160ms ease;
    }

    .toggle input::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #f8f4ed;
      transition: transform 160ms ease;
    }

    .toggle input:checked {
      background: var(--accent);
    }

    .toggle input:checked::after {
      transform: translateX(18px);
    }

    .form {
      padding: 16px 18px 18px;
    }

    .field {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .field:last-of-type {
      margin-bottom: 0;
    }

    .field label {
      color: #d8d0c4;
      font-size: 13px;
    }

    .field-slider {
      display: block;
    }

    .control,
    .color-stack {
      min-width: 0;
    }

    select,
    input[type='number'],
    input[type='text'] {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    input:disabled {
      background: var(--panel-muted);
      color: #8d8375;
    }

    .color-stack {
      display: grid;
      grid-template-columns: 1fr 86px;
      gap: 10px;
    }

    .color-input {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
    }

    input[type='color'] {
      width: 28px;
      height: 28px;
      border: none;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .slider-shell {
      --slider-fill: 0%;
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) 54px;
      align-items: center;
      min-height: 54px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background:
        linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.14) 0,
          rgba(255, 255, 255, 0.14) var(--slider-fill),
          rgba(255, 255, 255, 0.05) var(--slider-fill),
          rgba(255, 255, 255, 0.05) 100%
        );
    }

    .slider-title,
    .slider-value {
      padding: 0 16px;
      font-size: 13px;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .slider-title {
      color: #ddd4c7;
    }

    .slider-value {
      text-align: right;
      font-family: 'SF Mono', 'Monaco', monospace;
      border-left: 1px solid rgba(255, 255, 255, 0.06);
    }

    .slider-area {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 14px;
    }

    .slider-area::before {
      content: '';
      position: absolute;
      inset: 50% 14px auto;
      height: 1px;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.06);
    }

    .slider-ticks {
      position: absolute;
      inset: 0 14px;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent calc(20% - 1px),
          rgba(255, 255, 255, 0.12) calc(20% - 1px),
          rgba(255, 255, 255, 0.12) 20%
        );
      mask: linear-gradient(transparent 0, #000 42%, #000 58%, transparent 100%);
      pointer-events: none;
    }

    input[type='range'] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent;
      position: relative;
      z-index: 1;
      cursor: ew-resize;
    }

    input[type='range']::-webkit-slider-runnable-track {
      height: 100%;
      background: transparent;
    }

    input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 36px;
      border-radius: 999px;
      border: none;
      background: #f3eee7;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.22);
      margin-top: 9px;
    }

    input[type='range']::-moz-range-track {
      height: 100%;
      background: transparent;
      border: none;
    }

    input[type='range']::-moz-range-thumb {
      width: 8px;
      height: 36px;
      border-radius: 999px;
      border: none;
      background: #f3eee7;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.22);
    }

    input[type='range']:focus-visible {
      outline: none;
    }

    input[type='range']:focus-visible + .slider-ticks,
    .slider-shell:has(input[type='range']:focus-visible) {
      box-shadow: inset 0 0 0 1px rgba(241, 90, 41, 0.45);
    }

    .size-hint,
    #status {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      font-family: 'SF Mono', 'Monaco', monospace;
    }

    .footer {
      padding-top: 14px;
      margin-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <section class="panel">
    <header class="header">
      <div>
        <p class="eyebrow">Grid Systems</p>
        <h1>Overlay</h1>
        <p class="subtitle">Structural controls for the current page.</p>
      </div>

      <label class="toggle">
        <span>Visible</span>
        <input id="enabled" type="checkbox" checked />
      </label>
    </header>

    <form class="form">
      <div class="field">
        <label for="axis">Grid</label>
        <div class="control">
          <select id="axis">
            <option value="columns">Columns</option>
            <option value="rows">Rows</option>
          </select>
        </div>
      </div>

      <div class="field field-slider">
        <label class="sr-only" for="count">Count</label>
        <div class="slider-shell" data-slider-shell>
          <span class="slider-title">Count</span>
          <div class="slider-area">
            <input id="count" type="range" min="1" max="24" step="1" />
            <div class="slider-ticks"></div>
          </div>
          <output id="count-value" class="slider-value">6</output>
        </div>
      </div>

      <div class="field">
        <label for="color">Color</label>
        <div class="color-stack">
          <div class="color-input">
            <input id="color" type="color" value="#FF3B30" />
            <span>Overlay</span>
          </div>
          <input id="opacity" type="number" min="0" max="100" step="1" />
        </div>
      </div>

      <div class="field">
        <label for="distribution">Type</label>
        <div class="control">
          <select id="distribution"></select>
        </div>
      </div>

      <div class="field">
        <label for="size"><span data-size-label>Width</span></label>
        <div class="control">
          <input id="size" type="number" min="1" max="400" step="1" />
          <p class="size-hint" data-size-hint>Fixed track size</p>
        </div>
      </div>

      <div class="field field-slider">
        <label class="sr-only" for="margin">Margin</label>
        <div class="slider-shell" data-slider-shell>
          <span class="slider-title">Margin</span>
          <div class="slider-area">
            <input id="margin" type="range" min="0" max="240" step="1" />
            <div class="slider-ticks"></div>
          </div>
          <output id="margin-value" class="slider-value">32</output>
        </div>
      </div>

      <div class="field field-slider">
        <label class="sr-only" for="gutter">Gutter</label>
        <div class="slider-shell" data-slider-shell>
          <span class="slider-title">Gutter</span>
          <div class="slider-area">
            <input id="gutter" type="range" min="0" max="240" step="1" />
            <div class="slider-ticks"></div>
          </div>
          <output id="gutter-value" class="slider-value">20</output>
        </div>
      </div>

      <div class="footer">
        <p id="status">columns · 6 tracks · stretch · auto</p>
      </div>
    </form>
  </section>

  <script src="popup.js"></script>
</body>
</html>
